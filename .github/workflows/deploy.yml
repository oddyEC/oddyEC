name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages paths
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"

          if [[ "${REPO_NAME}" == "${OWNER}.github.io" ]]; then
            echo "BASE_PATH=/" >> "${GITHUB_ENV}"
            echo "SITE_URL=https://${OWNER}.github.io" >> "${GITHUB_ENV}"
          else
            echo "BASE_PATH=/${REPO_NAME}" >> "${GITHUB_ENV}"
            echo "SITE_URL=https://${OWNER}.github.io/${REPO_NAME}" >> "${GITHUB_ENV}"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Check internal links
        run: npm run check:links

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
